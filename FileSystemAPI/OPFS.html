<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <title>OPFS 示例</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { margin-right: 10px; padding: 8px 16px; }
        textarea { width: 100%; height: 200px; margin-top: 10px; }
        .input-row { margin: 10px 0; }
        input[type="text"] { width: 300px; padding: 6px; }
    </style>
</head>
<body>

<h2>Origin Private File System 示例</h2>

<button onclick="writeLog()">写入日志</button>
<button onclick="readLog()">读取日志</button>
<button onclick="clearLog()">清空日志</button>

<div class="input-row">
    <input id="inputText" type="text" placeholder="输入要追加的内容" />
    <button onclick="appendLog()">追加日志</button>
</div>

<textarea id="output" placeholder="日志内容会显示在这里..."></textarea>

<script>
    const FILE_NAME = "app-log.txt"

    async function getFileHandle(create = true) {
        try {
            const root = await navigator.storage.getDirectory()
            return await root.getFileHandle(FILE_NAME, { create })
        } catch (err) {
            alert("获取文件失败: " + err.message)
        }
    }

    async function writeLog() {
        try {
            const handle = await getFileHandle()
            const writable = await handle.createWritable()
            const content = `初始化日志\n时间: ${new Date().toLocaleString()}\n`
            await writable.write(content)
            await writable.close()
            alert("写入完成")
        } catch (err) {
            alert("写入失败: " + err.message)
        }
    }

    async function appendLog() {
        try {
            const input = document.getElementById("inputText").value
            if (!input) return alert("请输入内容")

            const handle = await getFileHandle()
            const file = await handle.getFile()
            const writable = await handle.createWritable({ keepExistingData: true })
            await writable.seek(file.size)
            await writable.write(`${input}\n`)
            await writable.close()

            document.getElementById("inputText").value = ""
            alert("追加完成")
        } catch (err) {
            alert("追加失败: " + err.message)
        }
    }

    async function readLog() {
        try {
            const handle = await getFileHandle(false)
            const file = await handle.getFile()
            const text = await file.text()
            document.getElementById("output").value = text
        } catch (err) {
            alert("文件不存在")
        }
    }

    async function clearLog() {
        try {
            const handle = await getFileHandle()
            const writable = await handle.createWritable()
            await writable.write("")
            await writable.close()
            document.getElementById("output").value = ""
            alert("已清空")
        } catch (err) {
            alert("清空失败: " + err.message)
        }
    }
</script>

</body>
</html>
