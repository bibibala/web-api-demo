<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"/>
    <title>Web 文件读写示例</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 300px;
            margin-top: 10px;
            font-size: 14px;
        }

        button {
            margin-right: 10px;
            padding: 8px 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>File System Access API 示例</h2>

<button onclick="openFile()">打开文件</button>
<button onclick="saveFile()">保存</button>
<button onclick="saveAs()">另存为</button>

<textarea id="editor" placeholder="请输入或打开文件..."></textarea>

<script>
    let fileHandle = null;

    async function openFile() {
        try {
            [fileHandle] = await window.showOpenFilePicker({
                types: [{
                    description: '文本文件',
                    accept: {'text/plain': ['.txt', '.md', '.json']}
                }]
            });

            const file = await fileHandle.getFile();
            const content = await file.text();
            document.getElementById('editor').value = content;

        } catch (err) {
            console.error('打开失败:', err);
        }
    }

    async function saveFile() {
        try {
            if (!fileHandle) {
                alert('请先打开文件或使用另存为');
                return;
            }

            const writable = await fileHandle.createWritable();
            await writable.write(document.getElementById('editor').value);
            await writable.close();

            alert('保存成功');

        } catch (err) {
            console.error('保存失败:', err);
        }
    }

    async function saveAs() {
        try {
            fileHandle = await window.showSaveFilePicker({
                suggestedName: 'new-file.txt',
                types: [{
                    description: '文本文件',
                    accept: {'text/plain': ['.txt']}
                }]
            });

            await saveFile();

        } catch (err) {
            console.error('另存为失败:', err);
        }
    }
</script>

</body>
</html>
